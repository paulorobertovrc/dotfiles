<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ctx-dash</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f4f5f7;
    --card-bg: #ffffff;

    /* Três níveis de texto. Antes havia só --muted, que achatava título,
       leitura, tendência e rótulo no mesmo peso visual. */
    --fg: #16171a;        /* primário: título e valores */
    --fg-2: #565d67;      /* secundário: leituras, tendência */
    --fg-3: #8b929c;      /* terciário: rótulos, metadados */
    --muted: #565d67;

    --border: #e1e3e8;
    --track: #e9ecef;
    --accent: #364fc7;

    /* Pressão de contexto. Os hex das BARRAS são os aprovados no spec (mesma
       semântica do terminal). Os de TEXTO são variantes com contraste
       suficiente para numeral: área preenchida e glifo têm exigências
       diferentes — âmbar #e8a33d em fundo branco não serve para texto. */
    --ok: #2f9e44;   --ok-t: #2b8a3e;
    --warn: #e8a33d; --warn-t: #b26b00;
    --crit: #e03131; --crit-t: #c92a2a;

    --font-ui: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-data: ui-monospace, "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;

    /* Escala de 4 degraus. Antes: oito tamanhos entre 0.68 e 1rem. */
    --t-micro: 0.6875rem;
    --t-body: 0.8125rem;
    --t-title: 0.9375rem;
    --t-hero: 1.875rem;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17181c;
      --card-bg: #232429;
      --fg: #eceef1;
      --fg-2: #a5acb6;
      --fg-3: #767d87;
      --muted: #a5acb6;
      --border: #33353c;
      --track: #35373d;
      --accent: #7f9dff;
      --ok-t: #51cf66;
      --warn-t: #ffb84d;
      --crit-t: #ff6b6b;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--fg);
  }
  /* Dígitos alinham em coluna quando se varre a grade. */
  .num { font-family: var(--font-data); font-variant-numeric: tabular-nums; }
  header {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1.25rem;
    padding: 0.85rem 1.25rem;
    border-bottom: 1px solid var(--border);
    background: var(--card-bg);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    font-size: var(--t-title);
    margin: 0;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  header .stat { font-size: var(--t-body); color: var(--fg-3); white-space: nowrap; }
  header .stat b { color: var(--fg); font-weight: 600; }
  header .spacer { flex: 1; }
  header label {
    font-size: var(--t-body);
    color: var(--fg-2);
    display: flex;
    align-items: center;
    gap: 0.35rem;
    cursor: pointer;
    user-select: none;
  }
  #clock {
    font-family: var(--font-data);
    font-variant-numeric: tabular-nums;
    font-size: var(--t-body);
    color: var(--fg-3);
  }

  /* Config ATIVA do CLI — global, não por sessão. Rotulada como tal. */
  #config {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: var(--t-body);
    color: var(--fg-3);
    white-space: nowrap;
  }
  #config .k {
    font-size: var(--t-micro);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--fg-3);
  }
  #config .chip {
    font-family: var(--font-data);
    font-size: var(--t-body);
    color: var(--fg);
    background: var(--track);
    border-radius: 5px;
    padding: 0.1rem 0.4rem;
  }
  #config .chip.ef { color: #fff; }

  #tabs { display: flex; gap: 4px; margin-left: 12px; }
  .tab { background: none; border: 1px solid var(--muted); color: var(--muted);
    border-radius: 6px; padding: 3px 10px; cursor: pointer; font-size: 0.85rem; }
  .tab.active { color: var(--fg); border-color: var(--fg); }
  .usage-tiles { display: flex; flex-wrap: wrap; gap: 12px; margin: 12px 0; }
  .usage-tile { border: 1px solid var(--muted); border-radius: 8px; padding: 10px 14px; min-width: 160px; }
  .usage-tile .label { color: var(--muted); font-size: 0.78rem; }
  .usage-tile .big { font-family: var(--font-data); font-variant-numeric: tabular-nums;
    font-size: 1.4rem; }
  .usage-tile .usd { color: var(--fg); font-size: 0.9rem; }
  /* Texto de aviso usa a variante -t (regra de contraste documentada em :root —
     o âmbar de área --warn não serve para glifo em fundo claro). */
  .usage-tile .partial { color: var(--warn-t, #b26b00); font-size: 0.72rem; }
  .usage-section-title { color: var(--muted); font-size: 0.8rem; margin: 16px 0 6px; }
  .model-row { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; margin: 2px 0; }
  .model-row .name { width: 180px; color: var(--fg); }
  .model-row .bar { height: 10px; background: var(--accent, #4a90d9); border-radius: 3px; }
  .rl-event { font-size: 0.82rem; color: var(--warn-t, #b26b00); margin: 2px 0; }
  .rl-event .when { color: var(--muted); }
  /* Mesmo respiro lateral do #grid — sem isto o conteúdo da aba cola na borda. */
  #usageView { padding: 0 1.25rem 1.25rem; }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1rem;
    padding: 1.25rem;
  }
  #empty { padding: 2rem; color: var(--muted); text-align: center; display: none; }
  /* #grid/#empty têm suas próprias declarações `display` (grid / none), que
     no cascade CSS batem o `[hidden]` do UA independente de especificidade.
     Sem isto, alternar para a view Uso via `.hidden = true` não tem efeito
     visual algum enquanto essas regras estiverem ativas — o que é sempre,
     no caso do #grid. */
  #grid[hidden], #empty[hidden] { display: none !important; }

  /* A pressão colore o card: a borda esquerda é o sinal que atravessa
     uma grade de vinte cards sem exigir leitura. */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--pressure, var(--border));
    border-radius: 10px;
    padding: 0.9rem 1rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
    cursor: pointer;
  }
  .card.inactive { opacity: 0.55; }
  .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .card-top {
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .dot { color: var(--ok); font-size: 0.8rem; line-height: 1; }
  .title {
    font-weight: 600;
    font-size: var(--t-title);
    letter-spacing: -0.005em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .badges { display: flex; gap: 0.3rem; flex-wrap: wrap; }
  .badge {
    font-size: var(--t-micro);
    font-weight: 700;
    padding: 0.12rem 0.45rem;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .subline {
    font-size: var(--t-body);
    color: var(--fg-3);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .ctx-block { display: flex; flex-direction: column; gap: 0.4rem; }

  /* O percentual é a resposta que a ferramenta existe para dar. Ele é o
     instrumento: grande, tabular, colorido pela pressão. A leitura crua e a
     sparkline o acompanham, subordinadas. */
  .ctx-hero {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
  }
  .pct {
    font-family: var(--font-data);
    font-variant-numeric: tabular-nums;
    font-size: var(--t-hero);
    font-weight: 600;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--pressure-t, var(--fg));
  }
  .reading {
    font-family: var(--font-data);
    font-variant-numeric: tabular-nums;
    font-size: var(--t-body);
    color: var(--fg-2);
  }
  /* SVG em baseline flutua; centraliza no eixo do numeral. */
  .ctx-hero .spark { margin-left: auto; align-self: center; }
  .spark svg { display: block; }

  .bar-track {
    height: 6px;
    border-radius: 3px;
    background: var(--track);
    overflow: hidden;
  }
  .bar-fill { height: 100%; border-radius: 3px; }
  .spark { color: var(--pressure-t, var(--accent)); line-height: 0; opacity: 0.7; }
  .trend {
    font-size: var(--t-body);
    color: var(--fg-2);
    font-variant-numeric: tabular-nums;
  }

  /* Seis células mantidas (decisão do spec). A hierarquia vem do par
     rótulo-em-micro-caixa-alta / valor-em-monospace, não da contagem. */
  .footer-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, auto);
    gap: 0.5rem;
    padding-top: 0.55rem;
    border-top: 1px solid var(--border);
  }
  .footer-grid .cell { display: flex; flex-direction: column; gap: 0.1rem; min-width: 0; }
  .footer-grid .k {
    font-size: var(--t-micro);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--fg-3);
    white-space: nowrap;
  }
  .footer-grid .v {
    font-family: var(--font-data);
    font-variant-numeric: tabular-nums;
    font-size: var(--t-body);
    color: var(--fg);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  dialog#detail {
    width: min(720px, 92vw);
    max-height: 88vh;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0;
    color: var(--fg);
    background: var(--card-bg);
  }
  dialog#detail::backdrop { background: rgba(0, 0, 0, 0.45); }
  #detail .detail-head {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.9rem 1.1rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--card-bg);
  }
  #detail .detail-head h2 {
    font-size: 1rem;
    margin: 0;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  #detail .detail-head button {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--fg);
    border-radius: 6px;
    padding: 0.25rem 0.6rem;
    cursor: pointer;
    font-size: 0.85rem;
  }
  #detail .detail-body { padding: 1rem 1.1rem 1.4rem; display: flex; flex-direction: column; gap: 1.4rem; }
  #detail section h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: var(--muted);
    margin: 0 0 0.5rem;
  }
  #detail .note { font-size: 0.78rem; color: var(--muted); margin-top: 0.35rem; }
  #detail .chart-wrap { width: 100%; }
  #detail svg.chart { width: 100%; height: auto; display: block; }
  #detail .axis-label { font-size: 9px; fill: var(--muted); }
  #detail .compact-line { stroke: #e03131; stroke-width: 1; stroke-dasharray: 3 3; }
  #detail .compact-label { font-size: 9px; fill: #e03131; }
  #detail .ctx-line { stroke: var(--accent); stroke-width: 1.75; fill: none; }
  #detail table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  #detail th, #detail td {
    text-align: left;
    padding: 0.3rem 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  #detail th { color: var(--muted); font-weight: 600; }
  #detail .toolbar { display: flex; flex-direction: column; gap: 0.4rem; }
  #detail .tool-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; }
  #detail .tool-name { width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #detail .tool-bar-track { flex: 1; height: 10px; border-radius: 4px; background: var(--track); overflow: hidden; }
  #detail .tool-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; }
  #detail .tool-count { width: 2.5rem; text-align: right; color: var(--muted); }
  #detail ul.plain { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.3rem; font-size: 0.8rem; }
  /* Reusada fora do dialog pela aba Uso (#usageComputing e empty-states). */
  #detail .empty-note, #usageView .empty-note { color: var(--muted); font-size: 0.82rem; }
</style>
</head>
<body>
<header>
  <h1>ctx-dash</h1>
  <nav id="tabs">
    <button type="button" class="tab active" data-view="sessions">Sessões</button>
    <button type="button" class="tab" data-view="usage">Uso</button>
  </nav>
  <div class="stat"><b id="liveCount">0</b> vivas</div>
  <div class="stat"><b id="jobCount">0</b> jobs ativos</div>
  <div class="spacer"></div>
  <div id="config" title="Configuração ativa do CLI. Sessões podem trocar de modelo em runtime via /model."></div>
  <label><input type="checkbox" id="showAllToggle"> mostrar inativas</label>
  <div id="clock">--:--:--</div>
</header>

<div id="grid"></div>
<div id="empty">nenhuma sessão inativa oculta — nada para mostrar</div>

<section id="usageView" hidden>
  <div class="usage-tiles" id="usageTiles"></div>
  <div id="usageComputing" class="empty-note">calculando uso do histórico…</div>
  <div id="usageBody"></div>
</section>

<dialog id="detail">
  <div class="detail-head">
    <h2 id="detailTitle"></h2>
    <button type="button" id="detailClose">fechar ✕</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</dialog>

<script>
"use strict";

const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g,
  c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const MODE_STYLE = {
  bypassPermissions: { bg: "#e03131", fg: "#fff" },   // único perigoso
  plan:              { bg: "#5f3dc4", fg: "#fff" },   // read-only, deliberando
  acceptEdits:       { bg: "#e8a33d", fg: "#000" },
  default:           { bg: "#868e96", fg: "#fff" },
  auto:              null                              // linha de base: sem badge
};

// Faixas de pressão do spec (mesma semântica do terminal). Devolve o nome do
// par de tokens CSS; a barra usa --ok/--warn/--crit e o numeral usa a variante
// -t, com contraste adequado para texto em ambos os temas.
function pressureName(pct) {
  if (pct >= 80) return "crit";
  if (pct >= 50) return "warn";
  return "ok";
}

function costLabel(cost) {
  if (cost == null) return "—";
  const usd = "$" + cost.usd.toFixed(2);
  return cost.partial ? usd + "+ (parcial)" : usd;
}

function fmtTok(n) {
  if (n == null) return "0";
  // Janela de 1M lia "1000k". Acima de 1e6 usa M, sem casa decimal supérflua.
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + "k";
  return String(n);
}

// No card, a célula de custo é estreita: o "+" já marca a estimativa parcial,
// e o texto completo vai no title. costLabel() (longo) segue no drill-down.
function costLabelShort(cost) {
  if (cost == null) return "—";
  return "$" + cost.usd.toFixed(2) + (cost.partial ? "+" : "");
}

function sparkline(values, w = 88, h = 22) {
  if (!values || values.length < 2) return "";
  const max = Math.max(...values) || 1;
  const pts = values.map((v, i) =>
    `${(i / (values.length - 1) * w).toFixed(1)},${(h - v / max * h).toFixed(1)}`).join(" ");
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" aria-hidden="true">
    <polyline fill="none" stroke="currentColor" stroke-width="1.5" points="${pts}"/></svg>`;
}

function trendLabel(s) {
  if (!s.tokensPerMin || s.tokensPerMin <= 0) return "→ estável";
  const rate = fmtTok(Math.round(s.tokensPerMin)) + " tok/min";
  if (s.etaMinutes == null) return "↑ " + rate;
  return "↑ " + rate + " · cheio em ~" + Math.round(s.etaMinutes) + " min";
}

function badge(text, style) {
  if (!style) return "";
  return `<span class="badge" style="background:${style.bg};color:${style.fg}">${esc(text)}</span>`;
}

function renderCard(s, jobsBySession) {
  const modeStyle = MODE_STYLE[s.permissionMode] !== undefined ? MODE_STYLE[s.permissionMode] : MODE_STYLE.default;
  const title = esc(s.title || s.id.slice(0, 8));
  const dot = s.live ? '<span class="dot">●</span>' : "";
  const job = jobsBySession.get(s.id);

  // "standard" é a linha de base do speed — aparecia em todo card, virava ruído
  // e roubava a largura do título. Mesmo princípio já aplicado ao permissionMode
  // "auto": só se destaca o que desvia da norma.
  const badges = [
    badge(s.permissionMode || "default", modeStyle),
    s.speed && s.speed !== "standard" ? badge(s.speed, MODE_STYLE.default) : "",
    job ? badge("bg: " + (job.state || job.id), MODE_STYLE.default) : ""
  ].filter(Boolean).join("");

  const sub = [esc(s.where), esc(s.branch), esc(s.model), s.version ? "v" + esc(s.version) : ""]
    .filter(Boolean).join(" · ");

  const pct = Math.round(s.pctFull || 0);
  const p = pressureName(pct);
  const reading = `${fmtTok(s.ctx)} / ${fmtTok(s.window)}`;

  const footer = [
    ["turnos", s.turns ?? "—", ""],
    ["cache", s.cacheHitPct != null ? Math.round(s.cacheHitPct) + "%" : "—", ""],
    ["custo", costLabelShort(s.cost), costLabel(s.cost)],
    ["subagents", s.subagents ?? 0, ""],
    ["compacts", s.compacts ?? 0, ""],
    ["web reqs", (s.webSearches || 0) + (s.webFetches || 0), ""]
  ].map(([label, v, tip]) =>
    `<div class="cell"${tip ? ` title="${esc(tip)}"` : ""}>` +
    `<span class="k">${esc(label)}</span><span class="v">${esc(String(v))}</span></div>`
  ).join("");

  // --pressure/-t alimentam a borda esquerda, o numeral e a sparkline.
  const style = `--pressure:var(--${p});--pressure-t:var(--${p}-t)`;

  return `<article class="card${s.live ? "" : " inactive"}" data-id="${esc(s.id)}" style="${style}" tabindex="0">
    <div class="card-top">
      ${dot}
      <div class="title" title="${title}">${title}</div>
      <div class="badges">${badges}</div>
    </div>
    <div class="subline" title="${sub}">${sub}</div>
    <div class="ctx-block">
      <div class="ctx-hero">
        <span class="pct">${esc(String(pct))}<span style="font-size:0.5em;font-weight:500">%</span></span>
        <span class="reading">${esc(reading)}</span>
        <span class="spark">${sparkline(s.sparkline)}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--${p})"></div></div>
      <div class="trend">${esc(trendLabel(s))}</div>
    </div>
    <div class="footer-grid">${footer}</div>
  </article>`;
}

// linePath(points, w, h, maxY, t0, t1) — copiado verbatim do brief da task 8.
function linePath(points, w, h, maxY, t0, t1) {
  if (points.length < 2 || !maxY) return "";
  const x = t => (t1 === t0 ? 0 : (t - t0) / (t1 - t0) * w);
  const y = v => h - (v / maxY) * h;
  return points
    .map((p, i) => `${i ? "L" : "M"}${x(p.ts).toFixed(1)},${y(p.ctx).toFixed(1)}`)
    .join(" ");
}

function fmtTime(ts) {
  if (!ts) return "—";
  try { return new Date(ts).toLocaleTimeString(); } catch { return "—"; }
}

function renderCtxChart(points, maxY) {
  const w = 640, h = 160;
  if (!points || points.length < 2 || !maxY) {
    return `<p class="empty-note">pontos insuficientes para desenhar o gráfico</p>`;
  }
  const t0 = points[0].ts, t1 = points[points.length - 1].ts;
  const path = linePath(points, w, h, maxY, t0, t1);
  const x = t => (t1 === t0 ? 0 : (t - t0) / (t1 - t0) * w);

  const compactMarks = points.filter(p => p.compact === true).map(p => {
    const cx = x(p.ts).toFixed(1);
    return `<line class="compact-line" x1="${cx}" y1="0" x2="${cx}" y2="${h}"/>
      <text class="compact-label" x="${cx}" y="10" text-anchor="middle">compact</text>`;
  }).join("");

  return `<div class="chart-wrap">
    <svg class="chart" viewBox="0 0 ${w} ${h + 16}" preserveAspectRatio="none">
      <path class="ctx-line" d="${esc(path)}"/>
      ${compactMarks}
      <text class="axis-label" x="0" y="${h + 12}">${esc(fmtTime(t0))}</text>
      <text class="axis-label" x="${w}" y="${h + 12}" text-anchor="end">${esc(fmtTime(t1))}</text>
      <text class="axis-label" x="2" y="10">${esc(fmtTok(maxY))}</text>
      <text class="axis-label" x="2" y="${h - 2}">0</text>
    </svg>
  </div>`;
}

function renderToolsSection(tools) {
  const entries = Object.entries(tools || {}).sort((a, b) => b[1] - a[1]);
  if (!entries.length) return `<p class="empty-note">nenhuma ferramenta usada</p>`;
  const max = Math.max(...entries.map(([, c]) => c)) || 1;
  const rows = entries.map(([name, count]) => `
    <div class="tool-row">
      <div class="tool-name" title="${esc(name)}">${esc(name)}</div>
      <div class="tool-bar-track"><div class="tool-bar-fill" style="width:${(count / max * 100).toFixed(1)}%"></div></div>
      <div class="tool-count">${esc(String(count))}</div>
    </div>`).join("");
  return `<div class="toolbar">${rows}</div>`;
}

function renderSubagentsSection(subagents) {
  if (!subagents || !subagents.length) return `<p class="empty-note">nenhum subagent registrado</p>`;
  const rows = subagents.map(s => `
    <tr>
      <td>${esc(s.agentType || "—")}</td>
      <td>${esc(s.description || "—")}</td>
      <td>${esc(s.model || "—")}</td>
      <td>${esc(fmtTok(s.tokens && s.tokens.input))}</td>
      <td>${esc(fmtTok(s.tokens && s.tokens.output))}</td>
    </tr>`).join("");
  return `<table>
    <thead><tr><th>tipo</th><th>descrição</th><th>modelo</th><th>tok in</th><th>tok out</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderModeTransitionsSection(transitions) {
  if (!transitions || !transitions.length) return `<p class="empty-note">nenhuma transição de modo</p>`;
  const items = transitions.map(t => `<li>${esc(fmtTime(Date.parse(t.at) || 0))} — ${esc(t.from)} → ${esc(t.to)}</li>`).join("");
  return `<ul class="plain">${items}</ul>`;
}

function renderCostSection(cost, totals) {
  if (cost == null) {
    const acc = totals ? (totals.input || 0) + (totals.output || 0) + (totals.cacheRead || 0) + (totals.cacheCreation || 0) : 0;
    return `<p><b>${esc(fmtTok(acc))}</b> tokens acumulados</p>
      <p class="note">preço não verificado para este modelo</p>`;
  }
  const label = costLabel(cost);
  const extra = cost.partial
    ? `<p class="note">+ parcial — inclui tokens sem preço confirmado (ver bucket long)</p>`
    : "";
  return `<p><b>${esc(label)}</b> total acumulado</p>${extra}`;
}

function renderWorkflowsSection(workflows) {
  if (!workflows || !workflows.length) return `<p class="empty-note">nenhum workflow registrado</p>`;
  // Formato de journal.jsonl nunca observado em disco nesta máquina — não desenhar
  // UI de detalhe estruturada, apenas confirmar quantidade de eventos registrados.
  return `<p>${esc(String(workflows.length))} evento(s) de workflow registrado(s) (formato ainda não validado — sem detalhe estruturado)</p>`;
}

async function openDetail(id) {
  const s = (lastData.sessions || []).find(x => x.id === id);
  const dlg = document.getElementById("detail");
  const title = document.getElementById("detailTitle");
  const body = document.getElementById("detailBody");
  title.textContent = (s && (s.title || s.id.slice(0, 8))) || id;
  body.innerHTML = `<p class="empty-note">carregando…</p>`;
  dlg.showModal();

  let data;
  try {
    const r = await fetch("/api/session/" + encodeURIComponent(id) + "/timeline");
    data = await r.json();
  } catch {
    body.innerHTML = `<p class="empty-note">falha ao carregar detalhe da sessão</p>`;
    return;
  }
  if (!data || data.error) {
    body.innerHTML = `<p class="empty-note">${esc((data && data.error) || "sessão não encontrada")}</p>`;
    return;
  }

  const points = data.points || [];
  const metrics = data.metrics || {};
  const cost = s ? s.cost : null;

  body.innerHTML = `
    <section>
      <h3>Contexto × tempo</h3>
      ${renderCtxChart(points, metrics.window)}
    </section>
    <section>
      <h3>Custo acumulado</h3>
      ${renderCostSection(cost, metrics.totals)}
    </section>
    <section>
      <h3>Ferramentas</h3>
      ${renderToolsSection(metrics.tools)}
    </section>
    <section>
      <h3>Subagents</h3>
      ${renderSubagentsSection(data.subagents)}
    </section>
    <section>
      <h3>Transições de modo</h3>
      ${renderModeTransitionsSection(metrics.modeTransitions)}
    </section>
    <section>
      <h3>Workflows</h3>
      ${renderWorkflowsSection(data.workflows)}
    </section>
  `;
}

document.getElementById("grid").addEventListener("click", e => {
  const card = e.target.closest(".card");
  if (!card) return;
  openDetail(card.dataset.id);
});
document.getElementById("detailClose").addEventListener("click", () => {
  document.getElementById("detail").close();
});
document.getElementById("detail").addEventListener("click", e => {
  if (e.target.id === "detail") document.getElementById("detail").close();
});

let showAll = false;
let lastData = { sessions: [], jobs: [] };

// Cores do effortLevel espelham o terminal (low=verde, medium=âmbar,
// high=magenta) e estendem para xhigh na mesma família. Valor desconhecido
// (ex.: "auto") cai no neutro — não se inventa cor para o que não se conhece.
const EFFORT_COLOR = {
  low: "#2f9e44",
  medium: "#e8a33d",
  high: "#7048e8",
  xhigh: "#ae3ec9"
};

function renderConfig(config) {
  const el = document.getElementById("config");
  if (!el) return;
  const cfg = config || {};
  if (!cfg.model && !cfg.effortLevel) { el.innerHTML = ""; return; }

  const parts = ['<span class="k">config</span>'];
  if (cfg.model) parts.push(`<span class="chip">${esc(cfg.model)}</span>`);
  if (cfg.effortLevel) {
    const c = EFFORT_COLOR[cfg.effortLevel];
    const style = c ? `background:${c}` : "";
    parts.push(`<span class="chip${c ? " ef" : ""}" style="${style}">ef:${esc(cfg.effortLevel)}</span>`);
  }
  el.innerHTML = parts.join("");
}

function render(d) {
  lastData = d;
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  const jobsBySession = new Map((d.jobs || []).map(j => [j.sessionId, j]));

  renderConfig(d.config);

  const sessions = (d.sessions || []).filter(s => showAll || s.live);
  document.getElementById("liveCount").textContent = (d.sessions || []).filter(s => s.live).length;
  document.getElementById("jobCount").textContent = (d.jobs || []).length;

  if (!sessions.length) {
    grid.innerHTML = "";
    empty.style.display = "block";
    return;
  }
  empty.style.display = "none";
  grid.innerHTML = sessions.map(s => renderCard(s, jobsBySession)).join("");
}

let currentView = "sessions";

function sumTokens(byModel) {
  let t = 0;
  for (const buckets of Object.values(byModel || {}))
    for (const b of Object.values(buckets))
      t += (b.input || 0) + (b.output || 0) + (b.cacheRead || 0)
         + (b.cacheCreation5m || 0) + (b.cacheCreation1h || 0);
  return t;
}
function fmtTokens(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + "k";
  return String(n);
}
function fmtUsd(cost) {
  if (!cost) return "—";
  return "$" + cost.usd.toFixed(2) + (cost.partial ? " ⚠" : "");
}
function usageTile(label, period) {
  const cost = period.cost;
  return `<div class="usage-tile">
    <div class="label">${esc(label)}</div>
    <div class="big num">${fmtTokens(sumTokens(period.byModel))}</div>
    <div class="usd num">${fmtUsd(cost)}</div>
    ${cost && cost.partial ? '<div class="partial">$ parcial (modelo sem preço)</div>' : ""}
  </div>`;
}
function renderModelBreakdown(byModel) {
  const rows = Object.entries(byModel || {})
    .map(([m, buckets]) => [m, sumTokens({ x: buckets })])
    .sort((a, b) => b[1] - a[1]);
  const max = rows.length ? rows[0][1] : 0;
  return rows.map(([m, t]) =>
    `<div class="model-row"><span class="name">${esc(m.replace("claude-", ""))}</span>` +
    `<span class="bar" style="width:${max ? Math.max(2, t / max * 320) : 2}px"></span>` +
    `<span class="num">${fmtTokens(t)}</span></div>`).join("");
}

function renderDailySeries(daily) {
  if (!daily.length) return '<div class="empty-note">sem atividade nos últimos 30 dias</div>';
  const vals = daily.map(d => sumTokens(d.byModel));
  const max = Math.max(...vals, 1);
  const w = 640, h = 120, bw = Math.max(2, w / daily.length - 2);
  const bars = daily.map((d, i) => {
    const bh = sumTokens(d.byModel) / max * h;
    const x = i * (w / daily.length);
    return `<rect x="${x.toFixed(1)}" y="${(h - bh).toFixed(1)}" width="${bw.toFixed(1)}" ` +
      `height="${bh.toFixed(1)}" fill="var(--accent,#4a90d9)"><title>${esc(d.date)}: ` +
      `${fmtTokens(sumTokens(d.byModel))} · ${fmtUsd(d.cost)}</title></rect>`;
  }).join("");
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">${bars}</svg>`;
}

function renderRateLimits(events) {
  if (!events || !events.length) return '<div class="empty-note">nenhum teto de sessão atingido no histórico retido</div>';
  return events.map(e =>
    `<div class="rl-event"><span class="when">${esc(new Date(e.ts).toLocaleString())}</span> — ` +
    `${esc(e.text || "limite de sessão")}</div>`).join("");
}

function renderUsage(u) {
  const oldest = u.oldestTs ? new Date(u.oldestTs).toLocaleDateString() : "—";
  // O rótulo é escapado UMA vez, dentro de usageTile — escapar aqui de novo
  // renderizaria entidades duplas se a data localizada tivesse metacaractere.
  document.getElementById("usageTiles").innerHTML =
    usageTile("últimas 5h (móvel)", u.win5h)
    + usageTile("últimos 7 dias", u.week7d)
    + usageTile("acumulado (retido desde " + oldest + ")", u.allTime);
  document.getElementById("usageBody").innerHTML =
    '<div class="usage-section-title">série diária (30d, tokens/dia)</div>'
    + renderDailySeries(u.daily)
    + '<div class="usage-section-title">acumulado por modelo</div>'
    + renderModelBreakdown(u.allTime.byModel)
    + '<div class="usage-section-title">tetos de sessão atingidos</div>'
    + renderRateLimits(u.rateLimits);
}

async function refreshUsage() {
  const computing = document.getElementById("usageComputing");
  try {
    const d = await (await fetch("/api/usage")).json();
    if (d.computing) { computing.style.display = "block"; return; }
    computing.style.display = "none";
    renderUsage(d);
  } catch {}
}

function setView(view) {
  currentView = view;
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.dataset.view === view));
  document.getElementById("grid").hidden = view !== "sessions";
  document.getElementById("empty").hidden = view !== "sessions";
  document.getElementById("usageView").hidden = view !== "usage";
  if (view === "usage") refreshUsage();
}
document.getElementById("tabs").addEventListener("click", e => {
  const btn = e.target.closest(".tab"); if (btn) setView(btn.dataset.view);
});

async function refresh() {
  try {
    const r = await fetch("/api/sessions");
    const d = await r.json();
    render(d);
  } catch {}
}

document.getElementById("showAllToggle").addEventListener("change", e => {
  showAll = e.target.checked;
  render(lastData);
});

function tickClock() {
  document.getElementById("clock").textContent = new Date().toLocaleTimeString();
}
setInterval(tickClock, 1000);
tickClock();

try {
  new EventSource("/api/events").addEventListener("change", () => {
    refresh();
    if (currentView === "usage") refreshUsage();
  });
} catch {}
setInterval(refresh, 5000);   // idades e detecção de processo entrando/saindo
refresh();
</script>
</body>
</html>
